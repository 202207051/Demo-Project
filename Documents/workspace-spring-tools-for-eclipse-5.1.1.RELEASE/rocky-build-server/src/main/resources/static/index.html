<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocky Online Compiler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; }
        .editor-container { 
            height: 450px; 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
            font-size: 14px;
            resize: none;
        }
        .result-container { 
            background-color: #1e1e1e; 
            color: #d4d4d4; 
            padding: 20px; 
            border-radius: 8px; 
            min-height: 200px; 
            white-space: pre-wrap;
            font-family: 'Consolas', monospace;
            border: 1px solid #333;
        }
        .error-text { color: #f44336; }
        .card { border: none; border-radius: 12px; }
        .card-header { border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-primary">Rocky Online Compiler</h1>
        <p class="text-muted">Docker 기반의 안전한 코드 실행 환경</p>
    </div>
    
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0">Code Editor</h5>
                    <select id="language" class="form-select form-select-sm w-auto">
                        <option value="java" selected>Java</option>
                        <option value="python">Python</option>
                        <option value="cpp">C/C++</option>
                    </select>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="userId" class="form-label fw-bold">User ID</label>
                        <input type="text" id="userId" class="form-control" placeholder="사용자 아이디를 입력하세요 (예: rocky_user)">
                    </div>
                    <div class="mb-3">
                        <label for="code" class="form-label fw-bold">Source Code</label>
                        <textarea id="code" class="form-control editor-container" placeholder="여기에 코드를 작성하세요..."></textarea>
                    </div>
                    <button id="runBtn" class="btn btn-success btn-lg w-100 fw-bold">RUN CODE</button>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow h-100">
                <div class="card-header bg-dark text-white py-3">
                    <h5 class="mb-0">Execution Output</h5>
                </div>
                <div class="card-body d-flex flex-column">
                    <div id="output" class="result-container flex-grow-1">코드를 실행하면 여기에 결과가 표시됩니다.</div>
                    <div class="mt-3 text-end text-muted small">
                        Status: <span id="status">Ready</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('runBtn').addEventListener('click', async () => {
        const userId = document.getElementById('userId').value;
        const language = document.getElementById('language').value;
        const code = document.getElementById('code').value;
        const outputDiv = document.getElementById('output');
        const statusSpan = document.getElementById('status');

        // 기본 유효성 검사
        if (!userId.trim()) {
            alert("User ID를 입력해주세요.");
            return;
        }
        if (!code.trim()) {
            alert("코드를 입력해주세요.");
            return;
        }

        // 상태 초기화
        outputDiv.innerText = "서버에서 코드를 실행 중입니다...\n(최대 10초 소요)";
        outputDiv.classList.remove('error-text');
        statusSpan.innerText = "Running...";
        statusSpan.className = "text-warning";

        try {
            // 백엔드 API 호출
            const response = await fetch('/api/v1/build/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, language, code })
            });

            const result = await response.json();

            if (result.success) {
                outputDiv.innerText = result.output || "실행 결과가 없습니다.";
                statusSpan.innerText = "Success";
                statusSpan.className = "text-success fw-bold";
            } else {
                outputDiv.classList.add('error-text');
                outputDiv.innerText = result.error || "실행 중 에러가 발생했습니다.";
                statusSpan.innerText = "Failed";
                statusSpan.className = "text-danger fw-bold";
            }
        } catch (error) {
            outputDiv.classList.add('error-text');
            outputDiv.innerText = "서버 연결 오류: " + error.message;
            statusSpan.innerText = "Network Error";
            statusSpan.className = "text-danger fw-bold";
        }
    });
</script>

</body>
</html>
